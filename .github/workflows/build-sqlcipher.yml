name: Build SQLCipher PHP 8.2 TS x64 Windows

on:
  workflow_dispatch:
    inputs:
      sqlcipher_tag:
        description: 'SQLCipher version tag'
        default: 'v4.5.7'
        required: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Generate SQLCipher amalgamation on Ubuntu (Tcl is pre-installed)
  # ─────────────────────────────────────────────────────────────────────────────
  build-amalgamation:
    runs-on: ubuntu-latest
    steps:
      - name: Clone SQLCipher ${{ github.event.inputs.sqlcipher_tag }}
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.sqlcipher_tag }}" \
            https://github.com/sqlcipher/sqlcipher.git sqlcipher

      - name: Generate SQLCipher amalgamation
        run: |
          cd sqlcipher
          ./configure --enable-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLITE_TEMP_STORE=2" \
            --with-crypto-lib=none 2>&1 | tail -5
          make sqlite3.c
          ls -lh sqlite3.c sqlite3.h
          # sqlite3ext.h comes from the source tree
          cp src/sqlite3ext.h ./sqlite3ext.h

      - name: Upload amalgamation
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher-amalgamation
          path: |
            sqlcipher/sqlite3.c
            sqlcipher/sqlite3.h
            sqlcipher/sqlite3ext.h
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build PHP extension on Windows
  # ─────────────────────────────────────────────────────────────────────────────
  build-dll:
    runs-on: windows-latest
    needs: build-amalgamation

    env:
      PHP_VERSION: '8.2.12'

    steps:

    # ── MSVC x64 ─────────────────────────────────────────────────────────────
    - name: Setup MSVC x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ── bison + re2c (required by configure.bat) ──────────────────────────────
    - name: Install bison and re2c
      run: |
        choco install winflexbison3 re2c -y --no-progress
        $bin = "C:\ProgramData\chocolatey\bin"
        Copy-Item "$bin\win_bison.exe" "$bin\bison.exe" -Force
        Copy-Item "$bin\win_flex.exe"  "$bin\flex.exe"  -Force
        Write-Host "bison: $(& bison --version | Select-Object -First 1)"
        Write-Host "re2c:  $(& re2c --version)"

    # ── PHP SDK ───────────────────────────────────────────────────────────────
    - name: Clone PHP SDK binary tools
      run: |
        git clone --depth 1 https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        echo "C:\php-sdk\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

    # ── OpenSSL from PHP Windows deps ─────────────────────────────────────────
    - name: Download OpenSSL deps
      run: |
        $url = "https://windows.php.net/downloads/php-sdk/deps/vs16/x64/openssl-3.0.15.pl1-vs16-x64.zip"
        Invoke-WebRequest $url -OutFile C:\openssl-deps.zip -UseBasicParsing
        Expand-Archive C:\openssl-deps.zip -DestinationPath C:\openssl-deps -Force
        Write-Host "OpenSSL lib contents:"
        Get-ChildItem C:\openssl-deps\lib | Select-Object Name

    # ── PHP source ────────────────────────────────────────────────────────────
    - name: Clone PHP ${{ env.PHP_VERSION }} source
      run: |
        git clone --depth 1 --branch php-$env:PHP_VERSION `
          https://github.com/php/php-src.git C:\php-src

    # ── Download SQLCipher amalgamation from Job 1 ────────────────────────────
    - name: Download SQLCipher amalgamation
      uses: actions/download-artifact@v4
      with:
        name: sqlcipher-amalgamation
        path: C:\sqlcipher-amal

    # ── Build SQLCipher static lib + setup C:\deps (auto-found by configure) ──
    # configure.bat looks for "..\deps" relative to C:\php-src → finds C:\deps
    # It adds C:\deps\lib to lib search path and C:\deps\include to CFLAGS
    - name: Build SQLCipher static library and populate C:\deps
      shell: cmd
      run: |
        rem Create the deps tree that configure auto-discovers
        md C:\deps\lib
        md C:\deps\include

        rem SQLCipher headers → C:\deps\include\
        copy C:\sqlcipher-amal\sqlite3.h    C:\deps\include\
        copy C:\sqlcipher-amal\sqlite3ext.h C:\deps\include\

        rem OpenSSL headers → C:\deps\include\openssl\
        xcopy /E /I /Q C:\openssl-deps\include\openssl C:\deps\include\openssl

        rem OpenSSL libs → C:\deps\lib\
        copy C:\openssl-deps\lib\libcrypto.lib C:\deps\lib\
        copy C:\openssl-deps\lib\libssl.lib    C:\deps\lib\

        echo Compiling SQLCipher amalgamation (this takes ~2 min)...
        cl /c /MD /O2 /nologo ^
          /DSQLITE_HAS_CODEC ^
          /DSQLITE_TEMP_STORE=2 ^
          /DSQLCIPHER_CRYPTO_OPENSSL ^
          /DSQLITE_ENABLE_COLUMN_METADATA ^
          /DSQLITE_ENABLE_FTS3 ^
          /DSQLITE_ENABLE_RTREE ^
          /DSQLITE_OMIT_LOAD_EXTENSION ^
          /I"C:\deps\include" ^
          /FoC:\deps\sqlite3.obj ^
          C:\sqlcipher-amal\sqlite3.c
        if errorlevel 1 (echo COMPILE FAILED & exit /b 1)

        lib /nologo /OUT:C:\deps\lib\libsqlite3_a.lib C:\deps\sqlite3.obj
        if errorlevel 1 (echo LIB FAILED & exit /b 1)

        echo C:\deps\lib contents:
        dir C:\deps\lib

    # ── buildconf ────────────────────────────────────────────────────────────
    - name: Run buildconf
      shell: cmd
      run: |
        set PATH=C:\php-sdk\bin;%PATH%
        cd /d C:\php-src
        call buildconf.bat --force
        if errorlevel 1 exit /b 1

    # ── configure ────────────────────────────────────────────────────────────
    - name: Run configure
      shell: cmd
      run: |
        set PATH=C:\php-sdk\bin;%PATH%
        rem libcrypto.lib is in C:\deps\lib (auto-found), but must be listed as default lib
        set LINK=/DEFAULTLIB:libcrypto.lib /DEFAULTLIB:crypt32.lib /DEFAULTLIB:ws2_32.lib

        cd /d C:\php-src
        echo Configure will auto-discover C:\deps as PHP_PHP_BUILD...
        call configure.bat ^
          --disable-all ^
          --enable-cli ^
          --enable-pdo ^
          --with-pdo-sqlite=shared
        if errorlevel 1 (
          echo configure FAILED - configure.log:
          powershell -Command "if (Test-Path configure.log) { Get-Content configure.log | Select-Object -Last 60 }"
          exit /b 1
        )
        echo configure SUCCEEDED - pdo_sqlite should be enabled as shared

    # ── nmake ─────────────────────────────────────────────────────────────────
    - name: Run nmake
      shell: cmd
      run: |
        set PATH=C:\php-sdk\bin;%PATH%
        set LINK=/DEFAULTLIB:libcrypto.lib /DEFAULTLIB:crypt32.lib /DEFAULTLIB:ws2_32.lib
        cd /d C:\php-src
        nmake php_pdo_sqlite
        if errorlevel 1 exit /b 1
        echo BUILD SUCCEEDED

    # ── Collect artifacts ─────────────────────────────────────────────────────
    - name: Collect artifacts
      run: |
        New-Item -ItemType Directory -Path artifacts -Force | Out-Null

        $releaseDirs = @("C:\php-src\Release_TS","C:\php-src\x64\Release_TS")
        foreach ($dir in $releaseDirs) {
          if (Test-Path $dir) {
            Write-Host "Contents of $dir :"
            Get-ChildItem $dir -Filter "*.dll" | Select-Object Name
          }
        }

        $found = $false
        foreach ($dir in $releaseDirs) {
          if (Test-Path "$dir\php_pdo_sqlite.dll") {
            Copy-Item "$dir\php_pdo_sqlite.dll" "artifacts\php_pdo_sqlcipher.dll"
            Write-Host "Collected: $dir\php_pdo_sqlite.dll"
            $found = $true
            break
          }
        }

        if (-not $found) {
          Write-Host "DLL not found — searching:"
          Get-ChildItem C:\php-src -Recurse -Filter "*.dll" | Select-Object FullName
          exit 1
        }

    # ── Upload ────────────────────────────────────────────────────────────────
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: php_pdo_sqlcipher-php82-ts-x64
        path: artifacts\
        retention-days: 90

    # ── Debug on failure ──────────────────────────────────────────────────────
    - name: Show logs on failure
      if: failure()
      shell: powershell
      run: |
        Write-Host "===== configure.log (last 60 lines) ====="
        if (Test-Path C:\php-src\configure.log) {
          Get-Content C:\php-src\configure.log | Select-Object -Last 60
        } else { Write-Host "No configure.log" }
        Write-Host "===== sqlcipher-libs ====="
        Get-ChildItem C:\sqlcipher-libs -Recurse | Select-Object FullName, Length
        Write-Host "===== Release_TS ====="
        Get-ChildItem "C:\php-src\Release_TS" -ErrorAction SilentlyContinue | Select-Object Name
        Get-ChildItem "C:\php-src\x64\Release_TS" -ErrorAction SilentlyContinue | Select-Object Name

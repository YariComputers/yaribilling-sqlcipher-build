name: Build SQLCipher PHP 8.2 TS x64 Windows

on:
  workflow_dispatch:
    inputs:
      sqlcipher_tag:
        description: 'SQLCipher version tag'
        default: 'v4.5.7'
        required: true

jobs:
  build:
    runs-on: windows-latest

    env:
      PHP_VERSION: '8.2.12'

    steps:

    # ── 1. MSVC x64 ──────────────────────────────────────────────────────────
    - name: Setup MSVC x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ── 2. PHP SDK (provides bison, flex, re2c needed by buildconf) ───────────
    - name: Clone PHP SDK binary tools
      run: |
        git clone --depth 1 https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        echo "C:\php-sdk\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        Write-Host "PHP SDK ready"

    # ── 3. OpenSSL ────────────────────────────────────────────────────────────
    - name: Install OpenSSL x64
      run: |
        choco install openssl --no-progress -y
        Write-Host "OpenSSL done"

    # ── 4. PHP source ─────────────────────────────────────────────────────────
    - name: Download PHP ${{ env.PHP_VERSION }} source
      run: |
        $url = "https://github.com/php/php-src/archive/refs/tags/php-$env:PHP_VERSION.zip"
        Write-Host "Downloading: $url"
        Invoke-WebRequest $url -OutFile C:\php-src.zip -UseBasicParsing
        Expand-Archive C:\php-src.zip -DestinationPath C:\php-src-raw
        $dir = Get-ChildItem C:\php-src-raw | Select-Object -First 1
        Move-Item $dir.FullName C:\php-src
        Write-Host "PHP source ready at C:\php-src"

    # ── 5. SQLCipher ──────────────────────────────────────────────────────────
    - name: Clone SQLCipher ${{ github.event.inputs.sqlcipher_tag }}
      run: |
        git clone --depth 1 --branch "${{ github.event.inputs.sqlcipher_tag }}" `
          https://github.com/sqlcipher/sqlcipher.git C:\sqlcipher
        Write-Host "SQLCipher ready"

    # ── 6. Find SQLite location in PHP source and replace with SQLCipher ──────
    - name: Integrate SQLCipher into PHP source
      run: |
        Write-Host "=== Searching for sqlite3.c in PHP source ==="
        $hits = Get-ChildItem C:\php-src -Recurse -Filter "sqlite3.c" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
        Write-Host "Found: $hits"

        # Primary location: ext/sqlite3/libsqlite/ (PHP 8.x standard)
        $libsqlite = "C:\php-src\ext\sqlite3\libsqlite"
        if (Test-Path $libsqlite) {
            Copy-Item C:\sqlcipher\sqlite3.c "$libsqlite\sqlite3.c" -Force
            Copy-Item C:\sqlcipher\sqlite3.h "$libsqlite\sqlite3.h" -Force
            Write-Host "Replaced in $libsqlite"
        } else {
            Write-Host "WARNING: $libsqlite not found"
        }

        # Also copy to ext/pdo_sqlite/ in case configure uses it directly
        $pdoSqlite = "C:\php-src\ext\pdo_sqlite"
        if (Test-Path $pdoSqlite) {
            Copy-Item C:\sqlcipher\sqlite3.c "$pdoSqlite\sqlite3.c" -Force
            Copy-Item C:\sqlcipher\sqlite3.h "$pdoSqlite\sqlite3.h" -Force
            Write-Host "Replaced in $pdoSqlite"
        }

        Write-Host "SQLCipher integration done"

    # ── 7. Configure and build ────────────────────────────────────────────────
    - name: Configure and build php_pdo_sqlite
      shell: cmd
      run: |
        rem ── Detect OpenSSL install path ──
        set OSSL=C:\Program Files\OpenSSL-Win64
        if not exist "%OSSL%" set OSSL=C:\OpenSSL-Win64
        if not exist "%OSSL%" set OSSL=C:\Program Files\OpenSSL
        if not exist "%OSSL%" (
          echo ERROR: OpenSSL not found. Listing C:\ top-level:
          dir C:\ /b
          exit /b 1
        )
        echo OpenSSL at: %OSSL%

        rem ── Find correct OpenSSL lib path ──
        if exist "%OSSL%\lib\VC\x64\MT\libcrypto.lib" (
          set OSSL_LIB=%OSSL%\lib\VC\x64\MT
          set OSSL_LIBNAME=libcrypto.lib
        ) else if exist "%OSSL%\lib\VC\x64\MD\libcrypto.lib" (
          set OSSL_LIB=%OSSL%\lib\VC\x64\MD
          set OSSL_LIBNAME=libcrypto.lib
        ) else if exist "%OSSL%\lib\VC\libcrypto64MD.lib" (
          set OSSL_LIB=%OSSL%\lib\VC
          set OSSL_LIBNAME=libcrypto64MD.lib
        ) else if exist "%OSSL%\lib\libcrypto.lib" (
          set OSSL_LIB=%OSSL%\lib
          set OSSL_LIBNAME=libcrypto.lib
        ) else (
          echo ERROR: libcrypto not found. Listing lib tree:
          dir "%OSSL%\lib" /s /b *.lib 2>nul
          exit /b 1
        )
        echo Using lib: %OSSL_LIB%\%OSSL_LIBNAME%

        rem ── Build ──
        cd /d C:\php-src

        call buildconf.bat --force
        if errorlevel 1 (echo buildconf FAILED & exit /b 1)

        call configure.bat ^
          --disable-all ^
          --enable-cli ^
          --enable-sqlite3=shared ^
          --with-pdo-sqlite=shared ^
          CFLAGS="/DSQLITE_HAS_CODEC /DSQLITE_TEMP_STORE=2 /DSQLCIPHER_CRYPTO_OPENSSL /DSQLITE_ENABLE_COLUMN_METADATA /DSQLITE_ENABLE_FTS3 /DSQLITE_ENABLE_RTREE /I\"%OSSL%\include\"" ^
          LDFLAGS="/LIBPATH:\"%OSSL_LIB%\"" ^
          LIBS="%OSSL_LIBNAME% user32.lib gdi32.lib advapi32.lib crypt32.lib ws2_32.lib"
        if errorlevel 1 (echo configure FAILED & exit /b 1)

        nmake php_sqlite3 php_pdo_sqlite
        if errorlevel 1 (echo nmake FAILED & exit /b 1)

        echo BUILD SUCCEEDED

    # ── 8. Collect artifacts ──────────────────────────────────────────────────
    - name: Collect artifacts
      run: |
        New-Item -ItemType Directory -Path artifacts -Force | Out-Null

        $releaseDirs = @(
          "C:\php-src\Release_TS",
          "C:\php-src\x64\Release_TS"
        )

        Write-Host "=== Searching for output DLLs ==="
        foreach ($dir in $releaseDirs) {
          if (Test-Path $dir) {
            Write-Host "Contents of $dir :"
            Get-ChildItem $dir -Filter "*.dll" | Select-Object Name
          }
        }

        $found = $false
        foreach ($dir in $releaseDirs) {
          $dll = "$dir\php_pdo_sqlite.dll"
          if (Test-Path $dll) {
            Copy-Item $dll "artifacts\php_pdo_sqlcipher.dll"
            Write-Host "Collected pdo_sqlite: $dll"
            $found = $true
          }
          $dll2 = "$dir\php_sqlite3.dll"
          if (Test-Path $dll2) {
            Copy-Item $dll2 "artifacts\php_sqlite3.dll"
            Write-Host "Collected sqlite3: $dll2"
          }
        }

        if (-not $found) {
          Write-Host "DLL not found — full search:"
          Get-ChildItem C:\php-src -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue | Select-Object FullName
          exit 1
        }

    # ── 9. Upload ─────────────────────────────────────────────────────────────
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: php_pdo_sqlcipher-php82-ts-x64
        path: artifacts\
        retention-days: 90

    # ── 10. Debug on failure ──────────────────────────────────────────────────
    - name: Show logs on failure
      if: failure()
      shell: cmd
      run: |
        echo ===== configure.log (last 80 lines) =====
        powershell -Command "if (Test-Path C:\php-src\configure.log) { Get-Content C:\php-src\configure.log | Select-Object -Last 80 } else { 'No configure.log found' }"
        echo ===== ext/sqlite3 structure =====
        dir C:\php-src\ext\sqlite3 /s /b 2>nul
        echo ===== ext/pdo_sqlite structure =====
        dir C:\php-src\ext\pdo_sqlite /s /b 2>nul
        echo ===== Release_TS contents =====
        dir C:\php-src\Release_TS 2>nul || echo No Release_TS
        dir "C:\php-src\x64\Release_TS" 2>nul || echo No x64\Release_TS

name: Build SQLCipher PHP 8.2 TS x64 Windows

on:
  workflow_dispatch:
    inputs:
      sqlcipher_tag:
        description: 'SQLCipher version tag'
        default: 'v4.5.7'
        required: true

jobs:
  build:
    runs-on: windows-latest

    env:
      PHP_VERSION: '8.2.12'

    steps:

    # ── 1. MSVC x64 (VS2022 runner, v142 toolset targets VS2019 ABI for PHP 8.2) ──
    - name: Setup MSVC x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ── 2. PHP SDK (provides bison, flex, re2c needed by buildconf) ───────────
    - name: Clone PHP SDK binary tools
      run: |
        git clone --depth 1 https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        echo "C:\php-sdk\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        Write-Host "PHP SDK ready, bin added to PATH"

    # ── 3. OpenSSL ────────────────────────────────────────────────────────────
    - name: Install OpenSSL x64
      run: |
        choco install openssl --no-progress -y
        Write-Host "OpenSSL done"

    # ── 4. PHP source ─────────────────────────────────────────────────────────
    - name: Download PHP ${{ env.PHP_VERSION }} source
      run: |
        $url = "https://github.com/php/php-src/archive/refs/tags/php-$env:PHP_VERSION.zip"
        Write-Host "Downloading: $url"
        Invoke-WebRequest $url -OutFile C:\php-src.zip -UseBasicParsing
        Write-Host "Extracting..."
        Expand-Archive C:\php-src.zip -DestinationPath C:\php-src-raw
        $dir = Get-ChildItem C:\php-src-raw | Select-Object -First 1
        Move-Item $dir.FullName C:\php-src
        Write-Host "PHP source ready at C:\php-src"

    # ── 5. SQLCipher ──────────────────────────────────────────────────────────
    - name: Clone SQLCipher ${{ github.event.inputs.sqlcipher_tag }}
      run: |
        git clone --depth 1 --branch "${{ github.event.inputs.sqlcipher_tag }}" `
          https://github.com/sqlcipher/sqlcipher.git C:\sqlcipher
        Write-Host "SQLCipher ready"

    # ── 6. Replace SQLite3 amalgamation with SQLCipher ────────────────────────
    - name: Integrate SQLCipher into pdo_sqlite
      run: |
        Copy-Item C:\sqlcipher\sqlite3.c C:\php-src\ext\pdo_sqlite\sqlite3.c -Force
        Copy-Item C:\sqlcipher\sqlite3.h C:\php-src\ext\pdo_sqlite\sqlite3.h -Force
        Write-Host "SQLCipher integrated into ext/pdo_sqlite"

    # ── 7. Configure and build ────────────────────────────────────────────────
    - name: Configure and build php_pdo_sqlite
      shell: cmd
      run: |
        rem ── Detect OpenSSL install path ──
        set OSSL=C:\Program Files\OpenSSL-Win64
        if not exist "%OSSL%" set OSSL=C:\OpenSSL-Win64
        if not exist "%OSSL%" (
          echo ERROR: OpenSSL not found
          exit /b 1
        )
        echo OpenSSL at: %OSSL%

        rem ── Find correct OpenSSL lib path ──
        if exist "%OSSL%\lib\VC\x64\MT\libcrypto.lib" (
          set OSSL_LIB=%OSSL%\lib\VC\x64\MT
          set OSSL_LIBNAME=libcrypto.lib
        ) else if exist "%OSSL%\lib\VC\libcrypto64MD.lib" (
          set OSSL_LIB=%OSSL%\lib\VC
          set OSSL_LIBNAME=libcrypto64MD.lib
        ) else if exist "%OSSL%\lib\libcrypto.lib" (
          set OSSL_LIB=%OSSL%\lib
          set OSSL_LIBNAME=libcrypto.lib
        ) else (
          echo ERROR: libcrypto not found. Listing %OSSL%\lib:
          dir "%OSSL%\lib" /s /b *.lib 2>nul
          exit /b 1
        )
        echo Using lib: %OSSL_LIB%\%OSSL_LIBNAME%

        rem ── Build ──
        cd /d C:\php-src

        call buildconf.bat --force
        if errorlevel 1 (echo buildconf FAILED & exit /b 1)

        call configure.bat ^
          --disable-all ^
          --enable-cli ^
          --with-pdo-sqlite=shared ^
          CFLAGS="/DSQLITE_HAS_CODEC /DSQLITE_TEMP_STORE=2 /DSQLCIPHER_CRYPTO_OPENSSL /DSQLITE_ENABLE_COLUMN_METADATA /DSQLITE_ENABLE_FTS3 /DSQLITE_ENABLE_RTREE /I\"%OSSL%\include\"" ^
          LDFLAGS="/LIBPATH:\"%OSSL_LIB%\"" ^
          LIBS="%OSSL_LIBNAME% user32.lib gdi32.lib advapi32.lib crypt32.lib ws2_32.lib" ^
          PHP_BUILD_COMPILER=vs16
        if errorlevel 1 (echo configure FAILED & exit /b 1)

        nmake php_pdo_sqlite
        if errorlevel 1 (echo nmake FAILED & exit /b 1)

        echo BUILD SUCCEEDED

    # ── 8. Collect artifact ───────────────────────────────────────────────────
    - name: Collect artifact
      run: |
        New-Item -ItemType Directory -Path artifacts -Force | Out-Null
        $candidates = @(
          "C:\php-src\Release_TS\php_pdo_sqlite.dll",
          "C:\php-src\x64\Release_TS\php_pdo_sqlite.dll"
        )
        $found = $false
        foreach ($dll in $candidates) {
          if (Test-Path $dll) {
            Copy-Item $dll "artifacts\php_pdo_sqlcipher.dll"
            Write-Host "Collected: $dll"
            $found = $true
            break
          }
        }
        if (-not $found) {
          Write-Host "DLL not found — searching all output dirs:"
          Get-ChildItem C:\php-src -Recurse -Filter "*.dll" -ErrorAction SilentlyContinue | Select-Object FullName
          exit 1
        }

    # ── 9. Upload ─────────────────────────────────────────────────────────────
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: php_pdo_sqlcipher-php82-ts-x64
        path: artifacts\
        retention-days: 90

    # ── 10. Debug on failure ──────────────────────────────────────────────────
    - name: Show logs on failure
      if: failure()
      shell: cmd
      run: |
        echo ===== configure.log (last 60 lines) =====
        powershell -Command "if (Test-Path C:\php-src\configure.log) { Get-Content C:\php-src\configure.log | Select-Object -Last 60 } else { 'No configure.log found' }"
        echo ===== Release_TS contents =====
        dir C:\php-src\Release_TS 2>nul || echo No Release_TS
        dir "C:\php-src\x64\Release_TS" 2>nul || echo No x64\Release_TS

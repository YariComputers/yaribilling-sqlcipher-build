name: Build SQLCipher PHP 8.2 TS x64 Windows

on:
  workflow_dispatch:
    inputs:
      sqlcipher_tag:
        description: 'SQLCipher version tag'
        default: 'v4.5.7'
        required: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Generate SQLCipher amalgamation on Ubuntu (Tcl is pre-installed)
  # ─────────────────────────────────────────────────────────────────────────────
  build-amalgamation:
    runs-on: ubuntu-latest
    steps:
      - name: Clone SQLCipher ${{ github.event.inputs.sqlcipher_tag }}
        run: |
          git clone --depth 1 --branch "${{ github.event.inputs.sqlcipher_tag }}" \
            https://github.com/sqlcipher/sqlcipher.git sqlcipher
          echo "SQLCipher cloned"

      - name: Generate SQLCipher amalgamation
        run: |
          cd sqlcipher
          # Tcl is pre-installed on ubuntu-latest
          which tclsh
          tclsh --version || true

          # Build the amalgamation using the SQLite/SQLCipher Makefile
          # The 'sqlite3.c' target generates the amalgamation
          ./configure --enable-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLITE_TEMP_STORE=2" \
            --with-crypto-lib=none 2>&1 | tail -5

          make sqlite3.c
          ls -lh sqlite3.c sqlite3.h

      - name: Upload amalgamation
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher-amalgamation
          path: |
            sqlcipher/sqlite3.c
            sqlcipher/sqlite3.h
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build PHP extension on Windows using the amalgamation
  # ─────────────────────────────────────────────────────────────────────────────
  build-dll:
    runs-on: windows-latest
    needs: build-amalgamation

    env:
      PHP_VERSION: '8.2.12'

    steps:

    # ── MSVC x64 ─────────────────────────────────────────────────────────────
    - name: Setup MSVC x64
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ── PHP SDK ───────────────────────────────────────────────────────────────
    - name: Clone PHP SDK binary tools
      run: |
        git clone --depth 1 https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        echo "C:\php-sdk\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        Write-Host "PHP SDK ready"

    # ── OpenSSL from PHP Windows deps ─────────────────────────────────────────
    - name: Download OpenSSL deps
      run: |
        $url = "https://windows.php.net/downloads/php-sdk/deps/vs16/x64/openssl-3.0.15.pl1-vs16-x64.zip"
        Invoke-WebRequest $url -OutFile C:\openssl-deps.zip -UseBasicParsing
        Expand-Archive C:\openssl-deps.zip -DestinationPath C:\openssl-deps -Force
        Write-Host "OpenSSL ready at C:\openssl-deps"
        dir C:\openssl-deps\lib

    # ── PHP source ────────────────────────────────────────────────────────────
    - name: Clone PHP ${{ env.PHP_VERSION }} source
      run: |
        git clone --depth 1 --branch php-$env:PHP_VERSION `
          https://github.com/php/php-src.git C:\php-src
        Write-Host "PHP source ready at C:\php-src"

    # ── Download SQLCipher amalgamation from Job 1 ────────────────────────────
    - name: Download SQLCipher amalgamation
      uses: actions/download-artifact@v4
      with:
        name: sqlcipher-amalgamation
        path: C:\sqlcipher-amal

    - name: Verify amalgamation
      run: |
        dir C:\sqlcipher-amal
        Write-Host "sqlite3.c size: $((Get-Item C:\sqlcipher-amal\sqlite3.c).Length) bytes"

    # ── Replace SQLite with SQLCipher amalgamation ────────────────────────────
    - name: Integrate SQLCipher into PHP source
      run: |
        Write-Host "=== Finding sqlite3.c in PHP source ==="
        Get-ChildItem C:\php-src -Recurse -Filter "sqlite3.c" | Select-Object FullName

        # PHP 8.x keeps SQLite amalgamation directly in ext/sqlite3/
        $dest = "C:\php-src\ext\sqlite3"
        Copy-Item C:\sqlcipher-amal\sqlite3.c "$dest\sqlite3.c" -Force
        Copy-Item C:\sqlcipher-amal\sqlite3.h "$dest\sqlite3.h" -Force
        Write-Host "Replaced sqlite3.c in $dest"

        # Also check libsqlite subdirectory (some PHP builds use it)
        $libsqlite = "$dest\libsqlite"
        if (Test-Path $libsqlite) {
            Copy-Item C:\sqlcipher-amal\sqlite3.c "$libsqlite\sqlite3.c" -Force
            Copy-Item C:\sqlcipher-amal\sqlite3.h "$libsqlite\sqlite3.h" -Force
            Write-Host "Also replaced in $libsqlite"
        }

    # ── Configure and build ───────────────────────────────────────────────────
    - name: Configure and build php_pdo_sqlite
      shell: cmd
      run: |
        rem OpenSSL from PHP deps (clean structure)
        set OSSL=C:\openssl-deps
        set OSSL_LIB=C:\openssl-deps\lib
        set OSSL_LIBNAME=libcrypto.lib
        echo OpenSSL include: %OSSL%\include
        echo OpenSSL lib: %OSSL_LIB%\%OSSL_LIBNAME%

        cd /d C:\php-src

        call buildconf.bat --force
        if errorlevel 1 (echo buildconf FAILED & exit /b 1)

        call configure.bat ^
          --disable-all ^
          --enable-cli ^
          --enable-sqlite3=shared ^
          --with-pdo-sqlite=shared ^
          CFLAGS="/DSQLITE_HAS_CODEC /DSQLITE_TEMP_STORE=2 /DSQLCIPHER_CRYPTO_OPENSSL /DSQLITE_ENABLE_COLUMN_METADATA /DSQLITE_ENABLE_FTS3 /DSQLITE_ENABLE_RTREE /I\"%OSSL%\include\"" ^
          LDFLAGS="/LIBPATH:\"%OSSL_LIB%\"" ^
          LIBS="%OSSL_LIBNAME% user32.lib gdi32.lib advapi32.lib crypt32.lib ws2_32.lib"
        if errorlevel 1 (echo configure FAILED & exit /b 1)

        nmake php_sqlite3 php_pdo_sqlite
        if errorlevel 1 (echo nmake FAILED & exit /b 1)

        echo BUILD SUCCEEDED

    # ── Collect artifacts ─────────────────────────────────────────────────────
    - name: Collect artifacts
      run: |
        New-Item -ItemType Directory -Path artifacts -Force | Out-Null

        $releaseDirs = @("C:\php-src\Release_TS","C:\php-src\x64\Release_TS")
        foreach ($dir in $releaseDirs) {
          if (Test-Path $dir) {
            Write-Host "Contents of $dir :"
            Get-ChildItem $dir -Filter "*.dll" | Select-Object Name
          }
        }

        $found = $false
        foreach ($dir in $releaseDirs) {
          if (Test-Path "$dir\php_pdo_sqlite.dll") {
            Copy-Item "$dir\php_pdo_sqlite.dll" "artifacts\php_pdo_sqlcipher.dll"
            Write-Host "Collected: $dir\php_pdo_sqlite.dll"
            $found = $true
          }
          if (Test-Path "$dir\php_sqlite3.dll") {
            Copy-Item "$dir\php_sqlite3.dll" "artifacts\php_sqlite3.dll"
          }
        }

        if (-not $found) {
          Write-Host "DLL not found — full search:"
          Get-ChildItem C:\php-src -Recurse -Filter "*.dll" | Select-Object FullName
          exit 1
        }

    # ── Upload ────────────────────────────────────────────────────────────────
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: php_pdo_sqlcipher-php82-ts-x64
        path: artifacts\
        retention-days: 90

    # ── Debug on failure ──────────────────────────────────────────────────────
    - name: Show logs on failure
      if: failure()
      shell: cmd
      run: |
        echo ===== configure.log (last 80 lines) =====
        powershell -Command "if (Test-Path C:\php-src\configure.log) { Get-Content C:\php-src\configure.log | Select-Object -Last 80 }"
        echo ===== ext/sqlite3 =====
        dir C:\php-src\ext\sqlite3 /b 2>nul
        echo ===== Release_TS =====
        dir C:\php-src\Release_TS 2>nul || echo No Release_TS
        dir "C:\php-src\x64\Release_TS" 2>nul || echo No x64\Release_TS
